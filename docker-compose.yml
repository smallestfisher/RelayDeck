services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    container_name: relaydeck-postgres
    environment:
      POSTGRES_DB: relaydeck_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - relaydeck-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d relaydeck_test"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: relaydeck-redis
    ports:
      - "6379:6379"
    volumes:
      - relaydeck-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  relaydeck-postgres-data:
  relaydeck-redis-data:
